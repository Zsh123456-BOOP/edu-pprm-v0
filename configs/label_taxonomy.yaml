{
  "_metadata": {
    "allowed_values_reference": "The keys under intervention_needed, minimal_repair_type, hint_level, and leakage_constraint are the only allowed values for proxy audit labels.",
    "short_definitions_reference": "Each label entry includes definition plus examples; proxy audit docs may use these as short definitions.",
    "boundary_examples_reference": "Boundary examples are maintained in docs/annotation_guideline.md and data/reports/boundary_cases_20.jsonl.",
    "coarse_category_mapping_reference": "See configs/minimal_repair_coarse_map.yaml for the 6-class minimal_repair_type mapping used in proxy agreement."
  },
  "intervention_needed": {
    "true": {
      "definition": "Tutor should intervene now because the current trace contains an actionable error or unsafe ambiguity.",
      "positive_examples": ["A local arithmetic error changes the next result.", "The student misreads a given quantity and continues from it."],
      "negative_examples": ["The student is correct so far.", "The student already notices and fixes the issue."],
      "common_confusions": ["Do not mark true only because the solution differs from the reference.", "Do not mark true when evidence is insufficient."]
    },
    "false": {
      "definition": "No intervention is needed at the current point.",
      "positive_examples": ["No-error trace.", "A minor wording issue does not affect the math.", "The student self-corrects before tutor action is useful."],
      "negative_examples": ["A hidden formula misuse affects later steps.", "The student copied a condition incorrectly."],
      "common_confusions": ["False is not the same as unknown.", "False should not be used for unclear work with missing evidence."]
    },
    "uncertain": {
      "definition": "The annotator cannot safely decide whether intervention is needed from the available information.",
      "positive_examples": ["Only a final answer is shown.", "The problem statement is ambiguous or missing."],
      "negative_examples": ["A clearly wrong substitution is visible.", "A fully correct derivation is visible."],
      "common_confusions": ["Use uncertain instead of inventing a hidden mistake.", "Use insufficient_information repair type with uncertain when appropriate."]
    }
  },
  "minimal_repair_type": {
    "no_intervention_needed": {
      "definition": "No repair should be given because no tutor intervention is needed.",
      "positive_examples": ["Correct trace.", "Self-corrected earlier slip."],
      "negative_examples": ["Incorrect formula use.", "Missing condition check."],
      "common_confusions": ["Do not use this for insufficient information."]
    },
    "ask_to_recompute_local_expression": {
      "definition": "Ask the student to recompute a specific arithmetic or algebraic expression.",
      "positive_examples": ["7*8 written as 54.", "2a+3=-3 solved as a=-2."],
      "negative_examples": ["Wrong formula selected.", "Problem quantity misunderstood."],
      "common_confusions": ["Do not reveal the corrected value unless hint policy allows it."]
    },
    "ask_to_reinterpret_given_quantity": {
      "definition": "Ask the student to revisit the meaning of a number, unit, condition, or relation in the problem.",
      "positive_examples": ["Treats three times as many tires as three times as many bicycles.", "Confuses total distance with one leg."],
      "negative_examples": ["Correct interpretation but arithmetic slip.", "Formatting-only issue."],
      "common_confusions": ["Use this before formula repair when the formula is wrong because the quantity was misread."]
    },
    "ask_to_rewrite_equation_or_expression": {
      "definition": "Ask the student to set up or rewrite the equation/expression that represents the problem.",
      "positive_examples": ["Uses x+5=20 instead of 5x=20.", "Drops parentheses when translating a word problem."],
      "negative_examples": ["Equation is right but solved incorrectly.", "Unit conversion mistake."],
      "common_confusions": ["Separate representation errors from downstream computation errors."]
    },
    "ask_to_check_operation_or_formula": {
      "definition": "Ask the student to verify the chosen operation, identity, theorem, or formula.",
      "positive_examples": ["Uses area formula for perimeter.", "Uses simple interest formula for compound interest."],
      "negative_examples": ["Correct formula with wrong substitution.", "Correct operation but arithmetic slip."],
      "common_confusions": ["Do not overuse when the issue is only a local expression."]
    },
    "ask_to_check_unit_conversion": {
      "definition": "Ask the student to check conversion between units or scales.",
      "positive_examples": ["Minutes converted to seconds incorrectly.", "Centimeters treated as meters."],
      "negative_examples": ["No unit change is involved.", "Formula choice is the real issue."],
      "common_confusions": ["Use local recomputation if the conversion setup is right but arithmetic is wrong."]
    },
    "ask_to_justify_inference": {
      "definition": "Ask the student to justify a logical inference or skipped reasoning step.",
      "positive_examples": ["Claims two expressions are equal without a condition.", "Infers monotonicity without support."],
      "negative_examples": ["Pure arithmetic slip.", "Question asks only for final numeric computation."],
      "common_confusions": ["Jumping steps can be acceptable when mathematically standard."]
    },
    "ask_to_compare_with_problem_condition": {
      "definition": "Ask the student to compare a step or answer against an explicit problem condition.",
      "positive_examples": ["Answer violates positivity.", "Chosen value fails a boundary condition."],
      "negative_examples": ["No explicit condition applies.", "Local computation has not reached a checkable condition."],
      "common_confusions": ["Use substitute_back when checking an equation rather than a story condition."]
    },
    "ask_to_substitute_back": {
      "definition": "Ask the student to substitute the result back into the equation or original requirement.",
      "positive_examples": ["Extraneous root from squaring.", "Solved variable should be checked in both equations."],
      "negative_examples": ["Initial setup is plainly wrong.", "No candidate value exists yet."],
      "common_confusions": ["This is a verification repair, not a formula-selection repair."]
    },
    "ask_clarifying_question": {
      "definition": "Ask a clarification question because the student's notation, statement, or problem context is ambiguous.",
      "positive_examples": ["Student uses x without defining it.", "Problem wording allows two interpretations."],
      "negative_examples": ["The mistake is clear enough to repair directly.", "The trace is simply missing all work."],
      "common_confusions": ["Do not use this to avoid deciding a clear error category."]
    },
    "insufficient_information": {
      "definition": "There is not enough information to choose a safe minimal repair.",
      "positive_examples": ["Only final answer shown.", "Problem text missing and no recoverable question field."],
      "negative_examples": ["Trace clearly shows a local arithmetic error.", "Student has a correct complete solution."],
      "common_confusions": ["Pair with intervention_needed uncertain, not false, unless no intervention is clearly appropriate."]
    }
  },
  "hint_level": {
    "none": {
      "definition": "No hint is needed.",
      "positive_examples": ["No-error trace.", "Self-corrected trace."],
      "negative_examples": ["Student needs a prompt to revisit a step."],
      "common_confusions": ["Do not use none with a nontrivial repair request."]
    },
    "low": {
      "definition": "Point to the local step or condition without naming the error.",
      "positive_examples": ["Ask the student to look again at step 2.", "Ask which quantity the 3 multiplies."],
      "negative_examples": ["Show a worked example.", "Name the exact formula error."],
      "common_confusions": ["Low hints should preserve student discovery."]
    },
    "medium": {
      "definition": "Name the type of issue or ask a targeted repair question without solving it.",
      "positive_examples": ["Ask whether the operation should be multiplication or addition.", "Ask to check unit conversion."],
      "negative_examples": ["Give the next computed value.", "Give the final answer."],
      "common_confusions": ["Medium can name error type but should not complete the step."]
    },
    "high": {
      "definition": "Provide a strong scaffold or micro-example while still avoiding the full solution.",
      "positive_examples": ["Show a parallel tiny example.", "State the relevant formula but ask the student to substitute."],
      "negative_examples": ["Solve the student's actual next step.", "Reveal final answer."],
      "common_confusions": ["High is still not a full solution."]
    },
    "forbidden_full_solution": {
      "definition": "A proposed hint would reveal too much and should not be used.",
      "positive_examples": ["The only hint would be the final answer.", "The next step is exactly the target answer."],
      "negative_examples": ["A local non-revealing prompt exists.", "A micro-example can avoid leakage."],
      "common_confusions": ["This labels hint safety, not whether the student is wrong."]
    }
  },
  "leakage_constraint": {
    "do_not_reveal_final_answer": {
      "definition": "Feedback must not reveal the final answer.",
      "positive_examples": ["Word problem asks for one number and next step computes it.", "Multiple choice answer can be inferred from hint."],
      "negative_examples": ["The final answer is already provided by the student and the task is to check reasoning."],
      "common_confusions": ["This can coexist with a local hint."]
    },
    "do_not_solve_next_step": {
      "definition": "Feedback must not perform the student's next required step.",
      "positive_examples": ["Ask them to recompute 48/2, do not state 24.", "Ask them to set up the equation, do not write it for them."],
      "negative_examples": ["A conceptual definition can be provided without solving."],
      "common_confusions": ["Do not confuse with final-answer leakage; both may apply conceptually, but choose the stricter local constraint."]
    },
    "can_point_to_local_step_only": {
      "definition": "Feedback may identify the relevant step but not explain the full correction.",
      "positive_examples": ["Step 3 is where the units change.", "Check the equation in line 2."],
      "negative_examples": ["Explaining the formula and substitution is necessary.", "No step exists to point to."],
      "common_confusions": ["Use with low hint level."]
    },
    "can_name_error_type": {
      "definition": "Feedback may name the error category while avoiding the correction.",
      "positive_examples": ["This looks like a unit conversion issue.", "Check the operation used here."],
      "negative_examples": ["Naming the category gives away the answer in a fragile puzzle."],
      "common_confusions": ["Usually pairs with medium hint level."]
    },
    "can_show_micro_example": {
      "definition": "Feedback may use a small analogous example that does not solve the target problem.",
      "positive_examples": ["Use a 2-minute to seconds conversion example.", "Show a simpler substitution check."],
      "negative_examples": ["The micro-example uses the same numbers as the target.", "The example reveals the final answer pattern too directly."],
      "common_confusions": ["Usually pairs with high hint level."]
    }
  }
}
